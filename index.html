<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intervall Trainer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    padding: 20px;
    -webkit-user-select: none;
    user-select: none;
  }
  .container { max-width: 500px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 20px; text-align: center; }
  .config {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .config label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #aaa; }
  .config input {
    width: 100%;
    padding: 12px;
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 1.2rem;
    text-align: center;
  }
  .display {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 30px 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  .phase { font-size: 1.4rem; color: #888; margin-bottom: 10px; min-height: 1.4em; }
  .phase.sprint { color: #ff3b30; }
  .phase.rest { color: #34c759; }
  .phase.warmup, .phase.cooldown { color: #007aff; }
  .countdown {
    font-size: 5rem;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    margin: 10px 0;
  }
  .countdown.urgent { color: #ff3b30; }
  .progress { font-size: 0.9rem; color: #666; }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  button {
    padding: 18px;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-start { background: #34c759; grid-column: span 2; }
  .btn-skip { background: #007aff; }
  .btn-reset { background: #3a3a3a; }
  button:disabled { opacity: 0.4; }
  .note {
    font-size: 0.8rem;
    color: #666;
    text-align: center;
    margin-top: 15px;
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🚴 Intervall Trainer</h1>

  <div class="config">
    <label for="reps">Anzahl Sprints</label>
    <input type="number" id="reps" value="6" min="1" max="30">
  </div>

  <div class="display">
    <div class="phase" id="phase">Bereit</div>
    <div class="countdown" id="countdown">--:--</div>
    <div class="progress" id="progress">5 min Einfahren · N×(20s Sprint / 90s Pause) · 5 min Ausfahren</div>
  </div>

  <div class="controls">
    <button class="btn-start" id="startBtn">Start</button>
    <button class="btn-skip" id="skipBtn" disabled>Phase überspringen</button>
    <button class="btn-reset" id="resetBtn">Reset</button>
  </div>

  <div class="note">
    <strong>iOS-Trick:</strong> Stiller Audio-Loop hält die Seite oft im Hintergrund aktiv – funktioniert solange Bildschirm an ist.<br>
    Beim Zurückkehren springt der Countdown automatisch auf die korrekte Zeit.
  </div>
</div>

<script>
let phases = [];
let currentIdx = 0;
let phaseEndTime = 0;
let pausedRemaining = 0;
let timerId = null;
let isRunning = false;
let wakeLock = null;
let spokenAt = new Set();
let silentAudio = null;

const phaseEl = document.getElementById('phase');
const countdownEl = document.getElementById('countdown');
const progressEl = document.getElementById('progress');
const startBtn = document.getElementById('startBtn');
const skipBtn = document.getElementById('skipBtn');
const resetBtn = document.getElementById('resetBtn');
const repsInput = document.getElementById('reps');

function createSilentAudio() {
  const wavBase64 = 'UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
  const audio = new Audio('data:audio/wav;base64,' + wavBase64);
  audio.loop = true;
  audio.volume = 0.001;
  return audio;
}

function startSilentAudio() {
  if (!silentAudio) silentAudio = createSilentAudio();
  silentAudio.play().catch(() => {});
}
function stopSilentAudio() {
  if (silentAudio) silentAudio.pause();
}

function buildPhases(reps) {
  const p = [];
  p.push({ name: 'Einfahren', type: 'warmup', duration: 300 });
  for (let i = 1; i <= reps; i++) {
    p.push({ name: `Sprint ${i}/${reps}`, type: 'sprint', duration: 20 });
    p.push({ name: `Pause ${i}/${reps}`, type: 'rest', duration: 90 });
  }
  p.push({ name: 'Ausfahren', type: 'cooldown', duration: 300 });
  return p;
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE';
  u.rate = 1.0;
  u.volume = 1.0;
  speechSynthesis.speak(u);
}

function fmt(s) {
  if (s < 0) s = 0;
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function getRemaining() {
  if (!isRunning) return pausedRemaining;
  return Math.max(0, Math.ceil((phaseEndTime - Date.now()) / 1000));
}

function updateDisplay() {
  const ph = phases[currentIdx];
  if (!ph) return;
  const remaining = getRemaining();
  phaseEl.textContent = ph.name;
  phaseEl.className = 'phase ' + ph.type;
  countdownEl.textContent = fmt(remaining);
  countdownEl.className = 'countdown' + (remaining <= 3 && remaining > 0 ? ' urgent' : '');
  progressEl.textContent = `Phase ${currentIdx + 1} / ${phases.length}`;
}

function announcePhaseStart() {
  const ph = phases[currentIdx];
  let msg = '';
  if (ph.type === 'warmup') msg = 'Einfahren, fünf Minuten locker';
  else if (ph.type === 'sprint') msg = 'Sprint! Volle Power, zwanzig Sekunden';
  else if (ph.type === 'rest') msg = 'Pause, locker rollen';
  else if (ph.type === 'cooldown') msg = 'Ausfahren, fünf Minuten locker';
  speak(msg);
}

function tick() {
  if (!isRunning) return;
  const remaining = getRemaining();
  updateDisplay();
  const ph = phases[currentIdx];

  if (remaining <= 3 && remaining > 0 && !spokenAt.has('cd' + remaining)) {
    speak(String(remaining));
    spokenAt.add('cd' + remaining);
  }
  if (remaining === 10 && ph.type === 'rest' && !spokenAt.has('w10')) {
    speak('Noch zehn Sekunden Pause');
    spokenAt.add('w10');
  }
  if (remaining === 30 && (ph.type === 'warmup' || ph.type === 'cooldown') && !spokenAt.has('w30')) {
    speak('Noch dreißig Sekunden');
    spokenAt.add('w30');
  }

  if (remaining <= 0) {
    nextPhase();
  }
}

function nextPhase() {
  currentIdx++;
  spokenAt.clear();
  if (currentIdx >= phases.length) {
    finish();
    return;
  }
  phaseEndTime = Date.now() + phases[currentIdx].duration * 1000;
  announcePhaseStart();
  updateDisplay();
}

function finish() {
  isRunning = false;
  clearInterval(timerId);
  speak('Training beendet. Gut gemacht!');
  phaseEl.textContent = 'Fertig 💪';
  phaseEl.className = 'phase';
  countdownEl.textContent = '00:00';
  startBtn.textContent = 'Start';
  startBtn.style.background = '#34c759';
  skipBtn.disabled = true;
  releaseWakeLock();
  stopSilentAudio();
}

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch (e) {}
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

startBtn.addEventListener('click', () => {
  if (!isRunning) {
    if (phases.length === 0 || currentIdx >= phases.length) {
      const reps = Math.max(1, parseInt(repsInput.value) || 1);
      phases = buildPhases(reps);
      currentIdx = 0;
      phaseEndTime = Date.now() + phases[0].duration * 1000;
      spokenAt.clear();
      speak('Los geht\'s');
      announcePhaseStart();
    } else {
      phaseEndTime = Date.now() + pausedRemaining * 1000;
    }
    isRunning = true;
    startSilentAudio();
    timerId = setInterval(tick, 250);
    startBtn.textContent = 'Pause';
    startBtn.style.background = '#ff9500';
    skipBtn.disabled = false;
    requestWakeLock();
    updateDisplay();
  } else {
    pausedRemaining = getRemaining();
    isRunning = false;
    clearInterval(timerId);
    speechSynthesis.cancel();
    stopSilentAudio();
    startBtn.textContent = 'Weiter';
    startBtn.style.background = '#34c759';
  }
});

skipBtn.addEventListener('click', () => {
  if (phases.length === 0) return;
  speechSynthesis.cancel();
  nextPhase();
});

resetBtn.addEventListener('click', () => {
  clearInterval(timerId);
  speechSynthesis.cancel();
  stopSilentAudio();
  isRunning = false;
  phases = [];
  currentIdx = 0;
  pausedRemaining = 0;
  spokenAt.clear();
  phaseEl.textContent = 'Bereit';
  phaseEl.className = 'phase';
  countdownEl.textContent = '--:--';
  countdownEl.className = 'countdown';
  progressEl.textContent = '5 min Einfahren · N×(20s Sprint / 90s Pause) · 5 min Ausfahren';
  startBtn.textContent = 'Start';
  startBtn.style.background = '#34c759';
  skipBtn.disabled = true;
  releaseWakeLock();
});

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isRunning) {
    requestWakeLock();
    while (isRunning && currentIdx < phases.length && Date.now() >= phaseEndTime) {
      nextPhase();
    }
    updateDisplay();
  }
});
</script>
</body>
</html>
